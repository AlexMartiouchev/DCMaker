{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DCMaker{% endblock %}</title>
    <style>
        :root {
            --bg: #16151c; --panel: #211f2b; --edge: #35323f;
            --text: #e8e5f0; --dim: #9b96ab; --accent: #b08d57;
            --leadership: #b0574f; --officer: #b08d57; --member: #6f8f6a; --mob: #5b7a99;
        }
        * { box-sizing: border-box; margin: 0; }
        body { background: var(--bg); color: var(--text); font-family: Georgia, serif; line-height: 1.5; }
        header { padding: 0.8rem 1.5rem; border-bottom: 1px solid var(--edge); display: flex; gap: 1rem; align-items: baseline; }
        header a { color: var(--accent); text-decoration: none; font-size: 1.2rem; }
        .crumbs { color: var(--dim); font-size: 0.9rem; }
        .crumbs a { color: var(--dim); font-size: 0.9rem; }
        main { max-width: 65rem; margin: 0 auto; padding: 1.5rem; }
        h1 { font-size: 1.6rem; margin-bottom: 0.2rem; }
        h2 { font-size: 1.1rem; margin: 1.5rem 0 0.6rem; color: var(--accent); }
        .sub { color: var(--dim); margin-bottom: 1rem; }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(16rem, 1fr)); gap: 0.8rem; }
        .card { background: var(--panel); border: 1px solid var(--edge); border-radius: 6px; padding: 0.9rem; }
        .card a { color: var(--text); text-decoration: none; font-weight: bold; }
        .card .meta { color: var(--dim); font-size: 0.85rem; margin: 0.15rem 0 0.4rem; }
        .card p { font-size: 0.9rem; }
        .card.empty { border-style: dashed; color: var(--dim); display: flex; align-items: center; justify-content: center; min-height: 6rem; }
        .badge { display: inline-block; font-size: 0.72rem; padding: 0.1rem 0.45rem; border-radius: 999px; color: #fff; }
        .badge.leadership { background: var(--leadership); } .badge.officer { background: var(--officer); }
        .badge.member { background: var(--member); } .badge.mob { background: var(--mob); }
        .badge.legendary { background: #7a4fb0; }
        .chip { display: inline-block; font-size: 0.78rem; background: var(--bg); border: 1px solid var(--edge); border-radius: 999px; padding: 0.05rem 0.5rem; margin: 0.1rem 0.1rem 0 0; color: var(--dim); }
        .stats { font-size: 0.82rem; color: var(--dim); margin-top: 0.4rem; }
        details { margin-top: 0.4rem; font-size: 0.85rem; }
        details summary { cursor: pointer; color: var(--dim); }
    </style>
</head>
<body>
    <header>
        <a href="{% url 'campaign_list' %}">⚔ DCMaker</a>
        <span class="crumbs">{% block crumbs %}{% endblock %}</span>
    </header>
    <main>{% block content %}{% endblock %}</main>
</body>
</html>
